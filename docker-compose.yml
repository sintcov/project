
services:
  nginx:
    image: sha256:341bf0f3ce6c5277d6002cf6e1fb0319fa4252add24ab6a0e262e0056d313208
    container_name: laravel-nginx
    volumes: 
      - ${PWD}/:/var/www/
      - ${PWD}/_docker/nginx/conf.d/:/etc/nginx/conf.d/
    ports:
      - "8085:80"
    depends_on:
      - app
      
  app:
    image: sha256:f648602b3d0a92151898c4581e5888734e11a38cdee111f517f4d0ff0f6c8e97
    volumes:
      - ${PWD}/:/var/www/

  db:
    image: mysql:latest
    restart: always
    volumes: 
      - ./tmp/db:/var/lib/mysql
      
    environment:
        MYSQL_DATABASE: lardocker
        MYSQL_ROOT_PASSWORD: root
        MYSQL_USER: user
        MYSQL_PASSWORD: user
    ports: 
      - "8181:3306"
    container_name: project_db

  phpmyadmin:  
    image: phpmyadmin:latest  
    restart: always  
    depends_on:  
      - db  
    environment:  
      PMA_HOST: db  
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:  
      - "8088:80"  
    container_name: project_phpmyadmin
